<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PumpkinCrush</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <audio id="bgMusic" src="assets/attachments/background music.mp3" autoplay loop></audio>
  <div class="game-container">
    <h1>🎃 PumpkinCrush 🎃</h1>

      <h2>Photo Values</h2>
      <div id="photoLegend"></div>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
